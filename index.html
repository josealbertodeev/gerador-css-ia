<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Gerador de IA</title>
</head>

<body>
    <img src="bot.jpg" alt="imagem de um robô" class="imagem-robo">
    <h1>Gerador CSS <span>com IA</span></h1>

    <p>Descreva o que você imagina e veja a mágica acontecer</p>

    <textarea rows="3" class="caixa-texto" placeholder="Ex: Bola azul pingando"></textarea>

    <button class="botao-gerar">Gerar Código ⚡️</button>

    <div class="container-codigo-preview">
        <div class="secao-codigo">
            <h2 class="texto-codigo">Código</h2>
            <p class="bloco-codigo"></p>
        </div>

        <div class="secao-preview">
            <h2 class="texto-codigo">Preview</h2>
            <iframe class="resultado-codigo"></iframe>
        </div>
    </div>
</body>

<script src="scripts.js"></script>

</html>
